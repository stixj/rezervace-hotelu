<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail žádosti (recepce)</title>
    <link rel="stylesheet" href="/css/direct-theme.css">
    <script src="/js/config.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="brand-block">
                <a href="/app/new" class="brand-direct-link" aria-label="Direct pojišťovna">
                    <img
                        src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                        class="brand-direct-logo"
                        data-brand-logo="/Loga/Logo-negativni-RGB.png"
                        width="174"
                        height="32"
                        alt=""
                    />
                </a>
            </div>
            <nav class="nav-pill" id="main-nav" aria-label="Hlavní navigace"></nav>
        </div>
    </header>

    <main class="main-content">
        <h1 class="page-title">Detail žádosti</h1>
        <p class="page-lead"><a href="/admin/requests">← Zpět na seznam</a></p>

        <div id="page-message" class="message" hidden role="status"></div>

        <div class="form-container loaded" id="detail-block" hidden>
            <dl class="status-detail" id="readonly-dl"></dl>

            <form id="status-form" class="form-section" style="margin-top: 24px;">
                <h2 class="section-title">Změna stavu a rezervace</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="status">Stav <span class="required">*</span></label>
                        <select id="status" required>
                            <option value="NEW">NEW</option>
                            <option value="IN_PROGRESS">IN_PROGRESS</option>
                            <option value="BOOKED">BOOKED</option>
                            <option value="CANCELLED">CANCELLED</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="hotel_name">Název hotelu</label>
                        <input id="hotel_name" type="text" placeholder="Vyplňte při BOOKED">
                    </div>
                    <div class="form-group">
                        <label for="reservation_number">Číslo rezervace</label>
                        <input id="reservation_number" type="text" placeholder="Vyplňte při BOOKED">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="cta" id="save-btn">Uložit</button>
                </div>
            </form>
        </div>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="site-footer-inner">
            <div class="site-footer-left">
                <a href="https://www.direct.cz" class="site-footer-site" target="_blank" rel="noopener noreferrer">direct.cz</a>
                <span class="site-footer-phone">221 221 221</span>
            </div>
            <p class="site-footer-legal">
                Direct pojišťovna, a.s. · Interní aplikace — žádosti o firemní ubytování.
            </p>
        </div>
    </footer>

    <script src="/js/common.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/nav.js"></script>
    <script>
        (function () {
            if (!HotelAuth.getToken()) {
                window.location.href = "/login";
                return;
            }

            const m = window.location.pathname.match(/\/admin\/requests\/([^/]+)/);
            const rid = m ? m[1] : null;
            if (!rid) {
                window.location.href = "/admin/requests";
                return;
            }

            const msgEl = document.getElementById("page-message");
            const block = document.getElementById("detail-block");
            const readonlyDl = document.getElementById("readonly-dl");
            const form = document.getElementById("status-form");
            const statusEl = document.getElementById("status");
            const hotelEl = document.getElementById("hotel_name");
            const resNoEl = document.getElementById("reservation_number");

            function showMessage(type, html) {
                msgEl.className = "message " + type;
                msgEl.innerHTML = html;
                msgEl.hidden = false;
            }

            (async () => {
                const meRes = await fetch(
                    (window.__API_BASE__ ?? "") + "/auth/me",
                    {
                        headers: {
                            Authorization: "Bearer " + HotelAuth.getToken(),
                        },
                    }
                );
                const me = await meRes.json().catch(() => ({}));
                if (!meRes.ok || me.role !== "RECEPTION") {
                    window.location.href = "/app/new";
                    return;
                }

                const { res, data } = await HotelAuth.apiJson(
                    "/admin/reservations/" + encodeURIComponent(rid)
                );
                if (!res.ok) {
                    showMessage("error", HotelCommon.parseErrorDetail(data));
                    return;
                }
                const r = data;
                readonlyDl.innerHTML = `
          <dt>ID</dt><dd><code>${HotelCommon.escapeHtml(String(r.id))}</code></dd>
          <dt>Stav</dt><dd><span class="status-pill">${HotelCommon.escapeHtml(r.status)}</span></dd>
          <dt>Žadatel</dt><dd>${HotelCommon.escapeHtml(r.requester_name)} &lt;${HotelCommon.escapeHtml(r.requester_email)}&gt;</dd>
          <dt>Město</dt><dd>${HotelCommon.escapeHtml(r.city)}</dd>
          <dt>Termín</dt><dd>${HotelCommon.escapeHtml(r.date_from)} – ${HotelCommon.escapeHtml(r.date_to)}</dd>
          <dt>Typ pokoje</dt><dd>${HotelCommon.escapeHtml(r.room_type)}</dd>
          <dt>Postele</dt><dd>${r.bed_preference ? HotelCommon.escapeHtml(r.bed_preference) : "—"}</dd>
          <dt>Poznámka</dt><dd>${r.note ? HotelCommon.escapeHtml(r.note) : "—"}</dd>
          <dt>Hotel / číslo (uloženo)</dt><dd>${r.hotel_name ? HotelCommon.escapeHtml(r.hotel_name) : "—"} / ${r.reservation_number ? HotelCommon.escapeHtml(r.reservation_number) : "—"}</dd>`;

                statusEl.value = r.status;
                hotelEl.value = r.hotel_name || "";
                resNoEl.value = r.reservation_number || "";
                block.hidden = false;

                form.addEventListener("submit", async (e) => {
                    e.preventDefault();
                    const st = statusEl.value;
                    const hotel_name = hotelEl.value.trim() || null;
                    const reservation_number = resNoEl.value.trim() || null;
                    if (st === "BOOKED" && (!hotel_name || !reservation_number)) {
                        showMessage(
                            "error",
                            "Pro stav BOOKED vyplňte název hotelu i číslo rezervace."
                        );
                        return;
                    }
                    const body = {
                        status: st,
                        hotel_name,
                        reservation_number,
                    };
                    const { res: sr, data: sd } = await HotelAuth.apiJson(
                        "/admin/reservations/" + encodeURIComponent(rid) + "/status",
                        { method: "POST", body: JSON.stringify(body) }
                    );
                    if (!sr.ok) {
                        showMessage("error", HotelCommon.parseErrorDetail(sd));
                        return;
                    }
                    window.location.href = "/admin/requests";
                });
            })();
        })();
    </script>
</body>
</html>
