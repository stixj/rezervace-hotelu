<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepce – žádosti</title>
    <link rel="stylesheet" href="/css/direct-theme.css">
    <script src="/js/config.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="brand-block">
                <a href="/app/new" class="brand-direct-link" aria-label="Direct pojišťovna">
                    <img
                        src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                        class="brand-direct-logo"
                        data-brand-logo="/Loga/Logo-negativni-RGB.png"
                        width="174"
                        height="32"
                        alt=""
                    />
                </a>
            </div>
            <nav class="nav-pill" id="main-nav" aria-label="Hlavní navigace"></nav>
        </div>
    </header>

    <main class="main-content">
        <h1 class="page-title">Všechny žádosti</h1>
        <p class="page-lead">Pracovní přehled a filtrování podle stavu.</p>

        <div id="inbox-priority-wrap" class="inbox-priority-wrap" hidden>
            <div id="inbox-priority-grid" class="inbox-priority-grid" data-inbox-layout="0">
                <section class="inbox-bento-card inbox-bento-card--urgent" id="inbox-block-urgent" hidden>
                    <header class="inbox-bento-card__header">
                        <h2 class="inbox-bento-card__title">Urgentní k řešení</h2>
                        <span class="inbox-bento-count" id="inbox-count-urgent" aria-hidden="true">0</span>
                    </header>
                    <ul class="inbox-bento-list" id="inbox-list-urgent"></ul>
                </section>
                <section class="inbox-bento-card inbox-bento-card--new" id="inbox-block-new" hidden>
                    <header class="inbox-bento-card__header">
                        <h2 class="inbox-bento-card__title">Nové žádosti</h2>
                        <span class="inbox-bento-count" id="inbox-count-new" aria-hidden="true">0</span>
                    </header>
                    <ul class="inbox-bento-list" id="inbox-list-new"></ul>
                </section>
                <section class="inbox-bento-card inbox-bento-card--storno" id="inbox-block-storno" hidden>
                    <header class="inbox-bento-card__header">
                        <h2 class="inbox-bento-card__title">Storna ke kontrole</h2>
                        <span class="inbox-bento-count" id="inbox-count-storno" aria-hidden="true">0</span>
                    </header>
                    <ul class="inbox-bento-list" id="inbox-list-storno"></ul>
                </section>
            </div>
        </div>

        <div class="form-container loaded">
            <form id="filter-form" class="form-row" style="align-items: flex-end;">
                <div class="form-group">
                    <label for="status-filter">Stav</label>
                    <select id="status-filter" name="status">
                        <option value="">Všechny</option>
                        <option value="NEW">Nová</option>
                        <option value="IN_PROGRESS">V řešení</option>
                        <option value="BOOKED">Rezervováno</option>
                        <option value="CANCELLED">Zrušeno</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <button type="submit" class="ghost">Filtrovat</button>
                </div>
            </form>
        </div>

        <div id="list-message" class="message" hidden role="status"></div>

        <div class="form-container loaded">
            <div class="table-wrap">
                <table class="data-table" id="requests-table">
                    <thead>
                        <tr>
                            <th scope="col" class="sort-cell">
                                <button type="button" class="th-sort" data-sort="status" aria-label="Řadit podle stavu">
                                    Stav<span class="sort-ind" aria-hidden="true">▲▼</span>
                                </button>
                            </th>
                            <th scope="col" class="sort-cell">
                                <button type="button" class="th-sort" data-sort="requester_name" aria-label="Řadit podle žadatele">
                                    Žadatel<span class="sort-ind" aria-hidden="true">▲▼</span>
                                </button>
                            </th>
                            <th scope="col" class="sort-cell">
                                <button type="button" class="th-sort" data-sort="requester_email" aria-label="Řadit podle e-mailu">
                                    E-mail<span class="sort-ind" aria-hidden="true">▲▼</span>
                                </button>
                            </th>
                            <th scope="col" class="sort-cell">
                                <button type="button" class="th-sort" data-sort="city" aria-label="Řadit podle města">
                                    Město<span class="sort-ind" aria-hidden="true">▲▼</span>
                                </button>
                            </th>
                            <th scope="col" class="sort-cell">
                                <button type="button" class="th-sort" data-sort="term" aria-label="Řadit podle termínu">
                                    Termín<span class="sort-ind" aria-hidden="true">▲▼</span>
                                </button>
                            </th>
                            <th scope="col"></th>
                        </tr>
                    </thead>
                    <tbody id="requests-body"></tbody>
                </table>
            </div>
            <p id="empty-hint" class="page-lead" hidden>Žádné záznamy.</p>
        </div>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="site-footer-inner">
            <div class="site-footer-left">
                <a href="https://www.direct.cz" class="site-footer-site" target="_blank" rel="noopener noreferrer">direct.cz</a>
                <span class="site-footer-phone">221 221 221</span>
            </div>
            <p class="site-footer-legal">
                Direct pojišťovna, a.s. · Interní aplikace — žádosti o firemní ubytování.
            </p>
        </div>
    </footer>

    <script src="/js/common.js?v=3"></script>
    <script src="/js/auth.js?v=2"></script>
    <script src="/js/nav.js"></script>
    <script>
        (function () {
            if (!HotelAuth.getToken()) {
                window.location.href = "/login";
                return;
            }

            const tbody = document.getElementById("requests-body");
            const msgEl = document.getElementById("list-message");
            const emptyHint = document.getElementById("empty-hint");
            const filterForm = document.getElementById("filter-form");
            const statusFilter = document.getElementById("status-filter");
            const requestsTable = document.getElementById("requests-table");
            const inboxWrap = document.getElementById("inbox-priority-wrap");
            const inboxGrid = document.getElementById("inbox-priority-grid");
            const inboxBlockUrgent = document.getElementById("inbox-block-urgent");
            const inboxBlockNew = document.getElementById("inbox-block-new");
            const inboxBlockStorno = document.getElementById("inbox-block-storno");
            const inboxListUrgent = document.getElementById("inbox-list-urgent");
            const inboxListNew = document.getElementById("inbox-list-new");
            const inboxListStorno = document.getElementById("inbox-list-storno");
            const inboxCountUrgent = document.getElementById("inbox-count-urgent");
            const inboxCountNew = document.getElementById("inbox-count-new");
            const inboxCountStorno = document.getElementById("inbox-count-storno");

            /** @type {object[]} */
            let listData = [];
            /** @type {string|null} */
            let sortKey = null;
            /** @type {'asc'|'desc'} */
            let sortDir = "asc";

            const STATUS_RANK = {
                NEW: 0,
                IN_PROGRESS: 1,
                BOOKED: 2,
                CANCELLED: 3,
            };

            function isActiveWorkflow(r) {
                return r.status !== "BOOKED" && r.status !== "CANCELLED";
            }

            function inboxUrgentRows(rows) {
                return rows.filter(
                    (r) => r.urgency === "URGENT" && isActiveWorkflow(r)
                );
            }

            function inboxNewStandardRows(rows) {
                return rows.filter(
                    (r) => r.status === "NEW" && r.urgency !== "URGENT"
                );
            }

            function inboxStornoRows(rows) {
                return rows.filter(
                    (r) => r.status === "CANCELLED" && r.was_ever_booked === true
                );
            }

            const INBOX_PREVIEW_MAX = 4;

            function inboxSortByTermAsc(rows) {
                return [...rows].sort((a, b) => {
                    const c = String(a.date_from).localeCompare(String(b.date_from));
                    return c !== 0 ? c : String(a.date_to).localeCompare(String(b.date_to));
                });
            }

            function inboxRowHtml(r, opts) {
                const showUrgency = opts && opts.showUrgency;
                const idEnc = encodeURIComponent(r.id);
                const href = "/admin/requests/" + idEnc;
                const chip =
                    showUrgency && r.urgency === "URGENT"
                        ? HotelCommon.urgencyChipHtml(r.urgency, r.urgency_reason)
                        : "";
                const name = HotelCommon.escapeHtml(r.requester_name);
                const city = HotelCommon.escapeHtml(r.city);
                const term = `${HotelCommon.escapeHtml(r.date_from)} – ${HotelCommon.escapeHtml(r.date_to)}`;
                return `<li class="inbox-bento-li">
  <a class="inbox-bento-row" href="${href}">
    <span class="inbox-bento-row__lead">${chip}<span class="inbox-bento-row__name">${name}</span></span>
    <span class="inbox-bento-row__city" title="Město">${city}</span>
    <span class="inbox-bento-row__term" title="Termín">${term}</span>
    <span class="inbox-bento-row__detail">Detail</span>
  </a>
</li>`;
            }

            function setInboxBlock(blockEl, listEl, countEl, items, rowOpts) {
                if (!items.length) {
                    blockEl.hidden = true;
                    listEl.innerHTML = "";
                    if (countEl) {
                        countEl.textContent = "0";
                    }
                    return;
                }
                blockEl.hidden = false;
                const total = items.length;
                const preview = inboxSortByTermAsc(items).slice(0, INBOX_PREVIEW_MAX);
                if (countEl) {
                    countEl.textContent = String(total);
                }
                listEl.innerHTML = preview.map((r) => inboxRowHtml(r, rowOpts)).join("");
            }

            function renderInbox() {
                if (!listData.length) {
                    inboxWrap.hidden = true;
                    if (inboxGrid) {
                        inboxGrid.setAttribute("data-inbox-layout", "0");
                    }
                    return;
                }
                const urgent = inboxUrgentRows(listData);
                const newStd = inboxNewStandardRows(listData);
                const storno = inboxStornoRows(listData);
                setInboxBlock(
                    inboxBlockUrgent,
                    inboxListUrgent,
                    inboxCountUrgent,
                    urgent,
                    { showUrgency: true }
                );
                setInboxBlock(inboxBlockNew, inboxListNew, inboxCountNew, newStd, {
                    showUrgency: false,
                });
                setInboxBlock(
                    inboxBlockStorno,
                    inboxListStorno,
                    inboxCountStorno,
                    storno,
                    { showUrgency: false }
                );
                const nU = urgent.length ? 1 : 0;
                const nN = newStd.length ? 1 : 0;
                const nS = storno.length ? 1 : 0;
                const nVisible = nU + nN + nS;
                if (inboxGrid) {
                    if (nVisible === 3) {
                        inboxGrid.setAttribute("data-inbox-layout", "bento-3");
                    } else if (nVisible === 2) {
                        inboxGrid.setAttribute("data-inbox-layout", "cols-2");
                    } else if (nVisible === 1) {
                        inboxGrid.setAttribute("data-inbox-layout", "single");
                    } else {
                        inboxGrid.setAttribute("data-inbox-layout", "0");
                    }
                }
                const any = nVisible > 0;
                inboxWrap.hidden = !any;
            }

            function showMessage(type, html) {
                msgEl.className = "message " + type;
                msgEl.innerHTML = html;
                msgEl.hidden = false;
            }

            function compareRows(a, b, key, dir) {
                const mul = dir === "asc" ? 1 : -1;
                let cmp = 0;
                if (key === "status") {
                    cmp =
                        (STATUS_RANK[a.status] ?? 99) - (STATUS_RANK[b.status] ?? 99);
                } else if (key === "requester_name") {
                    cmp = a.requester_name.localeCompare(b.requester_name, "cs", {
                        sensitivity: "base",
                    });
                } else if (key === "requester_email") {
                    cmp = a.requester_email.localeCompare(b.requester_email, undefined, {
                        sensitivity: "base",
                    });
                } else if (key === "city") {
                    cmp = String(a.city).localeCompare(String(b.city), "cs", {
                        sensitivity: "base",
                    });
                } else if (key === "term") {
                    cmp = String(a.date_from).localeCompare(String(b.date_from));
                    if (cmp === 0) {
                        cmp = String(a.date_to).localeCompare(String(b.date_to));
                    }
                }
                return cmp * mul;
            }

            function sortedRows() {
                if (!sortKey) {
                    return listData.slice();
                }
                return [...listData].sort((a, b) =>
                    compareRows(a, b, sortKey, sortDir)
                );
            }

            function updateSortIndicators() {
                document.querySelectorAll(".th-sort").forEach((btn) => {
                    const key = btn.getAttribute("data-sort");
                    const ind = btn.querySelector(".sort-ind");
                    if (key === sortKey) {
                        btn.setAttribute(
                            "aria-sort",
                            sortDir === "asc" ? "ascending" : "descending"
                        );
                        btn.setAttribute(
                            "title",
                            sortDir === "asc"
                                ? "Seřazeno vzestupně — klikněte pro sestupně"
                                : "Seřazeno sestupně — klikněte pro vzestupně"
                        );
                        if (ind) {
                            ind.textContent = sortDir === "asc" ? "▲" : "▼";
                        }
                    } else {
                        btn.removeAttribute("aria-sort");
                        btn.setAttribute(
                            "title",
                            "Řadit podle tohoto sloupce (vzestupně / sestupně)"
                        );
                        if (ind) {
                            /* Visible default: sortable columns show up/down chevrons before first click */
                            ind.textContent = "\u25B2\u25BC";
                        }
                    }
                });
            }

            function renderTable() {
                if (!listData.length) {
                    emptyHint.hidden = false;
                    requestsTable.hidden = true;
                    tbody.innerHTML = "";
                    renderInbox();
                    updateSortIndicators();
                    return;
                }
                emptyHint.hidden = true;
                requestsTable.hidden = false;
                const rows = sortedRows();
                tbody.innerHTML = rows
                    .map((r) => {
                        const idEnc = encodeURIComponent(r.id);
                        const chip = HotelCommon.urgencyChipHtml(
                            r.urgency,
                            r.urgency_reason
                        );
                        return `<tr>
              <td class="status-and-urgency-cell"><span class="status-pill" data-status="${HotelCommon.escapeHtml(r.status)}">${HotelCommon.escapeHtml(HotelCommon.statusLabel(r.status))}</span>${chip}</td>
              <td>${HotelCommon.escapeHtml(r.requester_name)}</td>
              <td>${HotelCommon.escapeHtml(r.requester_email)}</td>
              <td>${HotelCommon.escapeHtml(r.city)}</td>
              <td>${HotelCommon.escapeHtml(r.date_from)} – ${HotelCommon.escapeHtml(r.date_to)}</td>
              <td><a href="/admin/requests/${idEnc}">Detail</a></td>
            </tr>`;
                    })
                    .join("");
                renderInbox();
                updateSortIndicators();
            }

            async function loadList() {
                msgEl.hidden = true;
                const q = statusFilter.value
                    ? "?status=" + encodeURIComponent(statusFilter.value)
                    : "";
                const { res, data } = await HotelAuth.apiJson("/admin/reservations" + q);
                if (res.status === 403) {
                    showMessage("error", "Přístup pouze pro roli recepce.");
                    return;
                }
                if (!res.ok) {
                    showMessage("error", HotelCommon.parseErrorDetail(data));
                    return;
                }
                listData = Array.isArray(data) ? data : [];
                renderTable();
            }

            document.querySelectorAll(".th-sort").forEach((btn) => {
                btn.addEventListener("click", () => {
                    const key = btn.getAttribute("data-sort");
                    if (!key || !listData.length) {
                        return;
                    }
                    if (sortKey === key) {
                        sortDir = sortDir === "asc" ? "desc" : "asc";
                    } else {
                        sortKey = key;
                        sortDir = "asc";
                    }
                    renderTable();
                });
            });

            filterForm.addEventListener("submit", (e) => {
                e.preventDefault();
                loadList();
            });

            (async () => {
                const meRes = await fetch(
                    (window.__API_BASE__ ?? "") + "/auth/me",
                    {
                        headers: {
                            Authorization: "Bearer " + HotelAuth.getToken(),
                        },
                    }
                );
                const me = await meRes.json().catch(() => ({}));
                if (!meRes.ok || me.role !== "RECEPTION") {
                    window.location.href = "/app/new";
                    return;
                }
                await loadList();
            })();
        })();
    </script>
</body>
</html>
