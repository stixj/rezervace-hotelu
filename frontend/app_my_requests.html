<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje žádosti – Rezervace hotelu</title>
    <link rel="stylesheet" href="/css/direct-theme.css">
    <script src="/js/config.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="brand-block">
                <a href="/app/new" class="brand-direct-link" aria-label="Direct pojišťovna">
                    <img
                        src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                        class="brand-direct-logo"
                        data-brand-logo="/Loga/Logo-negativni-RGB.png"
                        width="174"
                        height="32"
                        alt=""
                    />
                </a>
            </div>
            <nav class="nav-pill" id="main-nav" aria-label="Hlavní navigace"></nav>
        </div>
    </header>

    <main class="main-content">
        <h1 class="page-title">Moje žádosti</h1>
        <p class="page-lead">Přehled žádostí vytvořených pod vaším účtem.</p>

        <div id="list-message" class="message" hidden role="status"></div>

        <div class="form-container loaded">
            <div class="table-wrap">
                <table class="data-table" id="requests-table">
                    <thead>
                        <tr>
                            <th>Stav</th>
                            <th>Město</th>
                            <th>Termín</th>
                            <th>Vytvořeno</th>
                            <th>Akce</th>
                        </tr>
                    </thead>
                    <tbody id="requests-body"></tbody>
                </table>
            </div>
            <p id="empty-hint" class="page-lead" hidden>Zatím nemáte žádné žádosti.</p>
        </div>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="site-footer-inner">
            <div class="site-footer-left">
                <a href="https://www.direct.cz" class="site-footer-site" target="_blank" rel="noopener noreferrer">direct.cz</a>
                <span class="site-footer-phone">221 221 221</span>
            </div>
            <p class="site-footer-legal">
                Direct pojišťovna, a.s. · Interní aplikace — žádosti o firemní ubytování.
            </p>
        </div>
    </footer>

    <script src="/js/common.js?v=3"></script>
    <script src="/js/auth.js?v=2"></script>
    <script src="/js/nav.js"></script>
    <script>
        (function () {
            if (!HotelAuth.getToken()) {
                window.location.href = "/login";
                return;
            }

            (async () => {
                const { res: mr, data: me } = await HotelAuth.apiJson("/auth/me");
                if (!mr.ok) {
                    return;
                }
                if (me.role === "RECEPTION") {
                    window.location.href = "/admin/requests";
                }
            })();

            const tbody = document.getElementById("requests-body");
            const msgEl = document.getElementById("list-message");
            const emptyHint = document.getElementById("empty-hint");

            function showMessage(type, html) {
                msgEl.className = "message " + type;
                msgEl.innerHTML = html;
                msgEl.hidden = false;
            }

            (async () => {
                const { res, data } = await HotelAuth.apiJson("/my/reservations");
                if (!res.ok) {
                    showMessage("error", HotelCommon.parseErrorDetail(data));
                    return;
                }
                if (!data.length) {
                    emptyHint.hidden = false;
                    document.getElementById("requests-table").hidden = true;
                    return;
                }
                tbody.innerHTML = data
                    .map((r) => {
                        const idEnc = encodeURIComponent(r.id);
                        const canEdit =
                            r.status !== "BOOKED" && r.status !== "CANCELLED";
                        const canCancel = r.status !== "CANCELLED";
                        const edit = canEdit
                            ? `<a href="/app/requests/${idEnc}">Upravit</a>`
                            : "—";
                        const cancel = canCancel
                            ? ` <button type="button" class="linklike" data-cancel="${String(r.id)}" data-booked="${r.status === "BOOKED" ? "1" : ""}">Zrušit</button>`
                            : "";
                        const uChip = HotelCommon.urgencyChipHtml(
                            r.urgency,
                            r.urgency_reason
                        );
                        return `<tr>
              <td class="status-and-urgency-cell"><span class="status-pill" data-status="${HotelCommon.escapeHtml(r.status)}">${HotelCommon.escapeHtml(HotelCommon.statusLabel(r.status))}</span>${uChip}</td>
              <td>${HotelCommon.escapeHtml(r.city)}</td>
              <td>${HotelCommon.escapeHtml(r.date_from)} – ${HotelCommon.escapeHtml(r.date_to)}</td>
              <td>${HotelCommon.escapeHtml(String(r.created_at || "").slice(0, 19))}</td>
              <td class="actions-cell"><a href="/app/requests/${idEnc}">Detail</a> · ${edit}${cancel}</td>
            </tr>`;
                    })
                    .join("");

                tbody.querySelectorAll("[data-cancel]").forEach((btn) => {
                    btn.addEventListener("click", async () => {
                        const id = btn.getAttribute("data-cancel");
                        const booked = btn.getAttribute("data-booked") === "1";
                        const msg = booked
                            ? "Opravdu zrušit tuto již potvrzenou rezervaci? Recepce bude informována."
                            : "Opravdu zrušit tuto žádost?";
                        if (!confirm(msg)) {
                            return;
                        }
                        const { res: cr, data: cd } = await HotelAuth.apiJson(
                            "/reservations/" + encodeURIComponent(id) + "/cancel",
                            { method: "POST" }
                        );
                        if (!cr.ok) {
                            alert(HotelCommon.parseErrorDetail(cd).replace(/<br>/g, "\n"));
                            return;
                        }
                        window.location.reload();
                    });
                });
            })();
        })();
    </script>
</body>
</html>
