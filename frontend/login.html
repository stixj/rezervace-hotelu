<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přihlášení – Rezervace hotelu</title>
    <link rel="stylesheet" href="/css/direct-theme.css">
    <script src="/js/config.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="brand-block">
                <a href="/app/new" class="brand-direct-link" aria-label="Direct pojišťovna">
                    <img
                        src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                        class="brand-direct-logo"
                        data-brand-logo="/Loga/Logo-negativni-RGB.png"
                        width="174"
                        height="32"
                        alt=""
                    />
                </a>
                <div class="brand-app-lines">
                    <span class="brand-title">Rezervace hotelu</span>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <h1 class="page-title">Přihlášení</h1>
        <p class="page-lead">Přihlaste se e-mailem a heslem.</p>

        <div class="form-container loaded">
            <form id="login-form" novalidate>
                <section class="form-section" aria-labelledby="sec-login">
                    <h2 id="sec-login" class="section-title">Účet</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">E-mail <span class="required">*</span></label>
                            <input id="email" name="email" type="email" required autocomplete="username">
                        </div>
                        <div class="form-group">
                            <label for="password">Heslo <span class="required">*</span></label>
                            <input id="password" name="password" type="password" required autocomplete="current-password">
                        </div>
                    </div>
                </section>
                <div class="form-actions">
                    <button type="submit" class="cta" id="login-btn">Přihlásit</button>
                </div>
            </form>
            <div id="form-message" class="message" hidden role="status" aria-live="polite"></div>
        </div>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="site-footer-inner">
            <div class="site-footer-left">
                <a href="https://www.direct.cz" class="site-footer-site" target="_blank" rel="noopener noreferrer">direct.cz</a>
                <span class="site-footer-phone">221 221 221</span>
            </div>
            <p class="site-footer-legal">
                Direct pojišťovna, a.s. · Interní aplikace — žádosti o rezervaci hotelu.
            </p>
        </div>
    </footer>

    <script src="/js/common.js?v=2"></script>
    <script src="/js/auth.js?v=2"></script>
    <script>
        (function () {
            const API_BASE = window.__API_BASE__ ?? "";
            const form = document.getElementById("login-form");
            const msgEl = document.getElementById("form-message");
            const btn = document.getElementById("login-btn");

            function showMessage(type, html) {
                msgEl.className = "message " + type;
                msgEl.innerHTML = html;
                msgEl.hidden = false;
            }

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                msgEl.hidden = true;
                btn.disabled = true;
                const body = {
                    email: document.getElementById("email").value.trim(),
                    password: document.getElementById("password").value,
                };
                try {
                    const res = await fetch(`${API_BASE}/auth/login`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(body),
                    });
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok) {
                        showMessage("error", HotelCommon.parseErrorDetail(data));
                        return;
                    }
                    HotelAuth.setToken(data.access_token);
                    const meRes = await fetch(`${API_BASE}/auth/me`, {
                        headers: { Authorization: "Bearer " + data.access_token },
                    });
                    const me = await meRes.json().catch(() => ({}));
                    if (me.role === "RECEPTION") {
                        window.location.href = "/admin/requests";
                    } else {
                        window.location.href = "/app/new";
                    }
                } catch {
                    showMessage("error", "Spojení s API selhalo.");
                } finally {
                    btn.disabled = false;
                }
            });
        })();
    </script>
</body>
</html>
